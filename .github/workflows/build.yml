name: Build and Release StackOrbitAI Bulk Writer Pro

on:
  push:
    tags:
      - 'v*' # Trigger build on version tag pushes (e.g. v1.0.0)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

env:
  GYP_MSVS_VERSION: 2022

jobs:
  release:
    name: Build & Package Desktop Client
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: macos-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Update NPM to latest (Fixes node-gyp compatibility issues)
        run: npm install -g npm@latest

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsecret-1-dev \
            libglib2.0-dev \
            fakeroot \
            dpkg

      - name: Install Python setuptools (Required for SQLite compilation on macOS)
        if: matrix.os == 'macos-latest'
        run: pip3 install setuptools --break-system-packages

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Compile Code Assets (build React & main processes)
        run: npm run build

      - name: Package App and Upload Release Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --publish always

  publish:
    name: Publish Release (Mark as non-draft after all platforms build)
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Mark Release as Published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} --draft=false -R ${{ github.repository }}
